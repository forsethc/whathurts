# Site:  sudo ln -s /path/to/whathurts/site /var/www/whathurts
# nginx: sudo ln -s /path/to/whathurts/deploy/nginx/whathurts.today.conf /etc/nginx/sites-enabled/
# SSL:   sudo certbot --nginx -d whathurts.today -d www.whathurts.today

server {
    listen 80;
    listen [::]:80;
    server_name whathurts.today www.whathurts.today;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    root /var/www/whathurts;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
