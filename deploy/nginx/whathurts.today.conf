# Install: sudo ln -s /path/to/whathurts/deploy/nginx/whathurts.today.conf /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d whathurts.today -d www.whathurts.today

server {
    listen 80;
    listen [::]:80;
    server_name whathurts.today www.whathurts.today;

    root /var/www/whathurts;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
