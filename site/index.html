<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What hurts today?</title>
  <meta name="description" content="A daily inventory of everything that aches when you wake up.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>What hurts today?</h1>
  </header>
  <main>
    <p class="hurt"></p>
  </main>
  <script>
    fetch('hurt.txt')
      .then(r => r.text())
      .then(t => { document.querySelector('.hurt').textContent = t.trim(); });
  </script>
</body>
</html>
